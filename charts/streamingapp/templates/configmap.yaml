apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "streamingapp.fullname" . }}-config
  labels:
    {{- include "streamingapp.labels" . | nindent 4 }}

data:
  NODE_ENV: "production"

  CLIENT_URLS: {{ .Values.clientUrls | quote }}

  AWS_REGION: {{ .Values.aws.region | quote }}
  AWS_S3_BUCKET: {{ .Values.aws.s3Bucket | quote }}
  AWS_CDN_URL: {{ .Values.aws.cdnUrl | quote }}

  STREAMING_PUBLIC_URL: {{ .Values.frontendConfig.streamingPublicUrl | quote }}
