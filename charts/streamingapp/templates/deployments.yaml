{{- range $name, $svc := .Values.services }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "streamingapp.fullname" $ }}-{{ $name }}
  labels:
    {{- include "streamingapp.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $name }}
spec:
  replicas: {{ $svc.replicas }}
  selector:
    matchLabels:
      {{- include "streamingapp.selectorLabels" $ | nindent 6 }}
      app.kubernetes.io/component: {{ $name }}
  template:
    metadata:
      labels:
        {{- include "streamingapp.selectorLabels" $ | nindent 8 }}
        app.kubernetes.io/component: {{ $name }}
    spec:
      containers:
        - name: {{ $name }}
          image: "{{ $svc.image.repository }}:{{ default $.Values.global.imageTag $svc.image.tag }}"
          imagePullPolicy: {{ $.Values.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ $svc.port }}
          env:
            - name: PORT
              value: {{ $svc.port | quote }}
          envFrom:
            - configMapRef:
                name: {{ include "streamingapp.fullname" $ }}-config
            {{- if ne $name "frontend" }}
            - secretRef:
                name: {{ include "streamingapp.secretName" $ }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: {{ $svc.healthPath }}
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: {{ $svc.healthPath }}
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            {{- toYaml $svc.resources | nindent 12 }}
---
{{- end }}
