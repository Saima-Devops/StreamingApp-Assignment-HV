{{- range $name, $svc := .Values.services }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "streamingapp.fullname" $ }}-{{ $name }}
  labels:
    {{- include "streamingapp.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $name }}
spec:
  replicas: {{ $svc.replicas }}
  selector:
    matchLabels:
      {{- include "streamingapp.selectorLabels" $ | nindent 6 }}
      app.kubernetes.io/component: {{ $name }}
  template:
    metadata:
      labels:
        {{- include "streamingapp.selectorLabels" $ | nindent 8 }}
        app.kubernetes.io/component: {{ $name }}
    spec:
      containers:
        - name: {{ $name }}
          image: "{{ $svc.image.repository }}:{{ default $.Values.global.imageTag $svc.image.tag }}"
          imagePullPolicy: {{ $.Values.imagePullPolicy }}

          ports:
            - name: http
              containerPort: {{ $svc.port }}

          env:
            - name: PORT
              value: {{ $svc.port | quote }}

            {{- if eq $name "frontend" }}
            - name: REACT_APP_AUTH_API_URL
              value: {{ $.Values.frontendConfig.authApiUrl | quote }}

            - name: REACT_APP_STREAMING_API_URL
              value: {{ $.Values.frontendConfig.streamingApiUrl | quote }}

            - name: REACT_APP_STREAMING_PUBLIC_URL
              value: {{ $.Values.frontendConfig.streamingPublicUrl | quote }}

            - name: REACT_APP_ADMIN_API_URL
              value: {{ $.Values.frontendConfig.adminApiUrl | quote }}

            - name: REACT_APP_CHAT_API_URL
              value: {{ $.Values.frontendConfig.chatApiUrl | quote }}

            - name: REACT_APP_CHAT_SOCKET_URL
              value: {{ $.Values.frontendConfig.chatSocketUrl | quote }}
            {{- end }}

          envFrom:
            - configMapRef:
                name: {{ include "streamingapp.fullname" $ }}-config

            {{- if ne $name "frontend" }}
            - secretRef:
                name: {{ include "streamingapp.secretName" $ }}
            {{- end }}

          readinessProbe:
            httpGet:
              path: {{ $svc.healthPath }}
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: {{ $svc.healthPath }}
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3

          resources:
            {{- toYaml $svc.resources | nindent 12 }}

---
{{- end }}
