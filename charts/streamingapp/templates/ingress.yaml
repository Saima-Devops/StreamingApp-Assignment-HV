{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "streamingapp.fullname" . }}
  labels:
    {{- include "streamingapp.labels" . | nindent 4 }}
  annotations:
    {{- toYaml .Values.ingress.annotations | nindent 4 }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  rules:
    - {{- if .Values.ingress.host }}
      host: {{ .Values.ingress.host | quote }}
      {{- end }}
      http:
        paths:
          - path: /api/auth
            pathType: Prefix
            backend:
              service:
                name: {{ include "streamingapp.fullname" . }}-auth
                port:
                  name: http
          - path: /api/streaming
            pathType: Prefix
            backend:
              service:
                name: {{ include "streamingapp.fullname" . }}-streaming
                port:
                  name: http
          - path: /api/admin
            pathType: Prefix
            backend:
              service:
                name: {{ include "streamingapp.fullname" . }}-admin
                port:
                  name: http
          - path: /api/chat
            pathType: Prefix
            backend:
              service:
                name: {{ include "streamingapp.fullname" . }}-chat
                port:
                  name: http
          - path: /socket.io
            pathType: Prefix
            backend:
              service:
                name: {{ include "streamingapp.fullname" . }}-chat
                port:
                  name: http
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "streamingapp.fullname" . }}-frontend
                port:
                  name: http
{{- end }}
